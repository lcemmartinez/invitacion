<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV - Fernanda Jocelyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">

        <header class="header">
            <h1 class="header-prefix">MIS XV</h1>
            <h2 class="header-name">FERNANDA JOCELYN</h2>
        </header>

        <section class="photo-section">
            
                <div class="carousel">
                    <div class="carousel-inner">
                        <input type="radio" name="slider" id="item-1" checked>
                        <input type="radio" name="slider" id="item-2">
                        <input type="radio" name="slider" id="item-3">
                        
                        <div class="cards">
                            <label class="card" for="item-1" id="song-1">
                                <img src="assets/images/quinceanera.png">
                            </label>
                            <label class="card" for="item-2" id="song-2">
                                <img src="assets/images/foto2.jpg">
                            </label>
                            <label class="card" for="item-3" id="song-3">
                                <img src="assets/images/foto3.jpg">
                            </label>
                        </div>
                    </div>
                </div>
            </section>

        


        <section class="details-section">
            <div class="content-wrapper">
                <h3 class="event-date">SÁBADO, 17 DE OCTUBRE, 2026</h3>

                <div class="event-info">
                    <div class="info-item">
                        <i class="fas fa-clock icon-gold"></i>
                        <div>
                            <strong>RECEPCIÓN:</strong><br>
                            <span>5:00 PM</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt icon-gold"></i>
                        <div>
                            <span>Col. 3 de mayo Calle Miguel Hidalgo 
                                entre 10 de mayo y 6 de enero</span>
                                    
                             <span>Abrir  Ubicación</span>       
                        </div>
                    </div>
                </div>

                <div class="countdown-container">
                    <h4>CUENTA REGRESIVA</h4>
                    <div id="countdown" class="countdown-circles">
                        </div>
                </div>
            </div>
        </section>

        <section class="actions-section">
            <div class="action-card rsvp-card">
                <p class="action-label">CONFIRMAR ASISTENCIA (RSVP)</p>
                <button class="btn-rsvp">CONFIRMAR AQUÍ</button>
            </div>
            <div class="action-card gift-card">
                <p class="action-label">MESA DE REGALOS</p>
                <button class="btn-gift">
                    <i class="fas fa-gift"></i> VER DETALLES
                </button>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-left">
                <i class="fas fa-share-alt"></i> Compartir
            </div>
            <div class="footer-right">
                <span>Ubicación</span>
                <span>Itinerario</span>
                <span>Fotos</span>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
