<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV - Fernanda Jocelyn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header class="header">
            <h1 class="header-prefix">MIS XV</h1>
            <h2 class="header-name">FERNANDA JOCELYN</h2>
        </header>

        <section class="photo-section">
            <div class="carousel">
                <div class="carousel-inner">
                    <div class="card">
                        <img src="assets/images/quinceanera.jpg" alt="Foto 1">
                    </div>
                    <div class="card">
                        <img src="assets/images/foto2.jpg" alt="Foto 2">
                    </div>
                    <div class="card">
                        <img src="assets/images/foto3.jpg" alt="Foto 3">
                    </div>
                </div>
            </div>
        </section>

        <section class="details-section">
            <h3 class="event-date">SÁBADO, 17 DE OCTUBRE, 2026</h3>
            <div class="event-info">
                <div class="info-item">
                    <i class="fas fa-clock icon-gold"></i>
                    <div><strong>RECEPCIÓN:</strong><br><span>7:00 PM</span></div>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt icon-gold"></i>
                    <div><strong>SALÓN:</strong><br><span>JARDÍN LUNA</span></div>
                </div>
            </div>

            <div class="countdown-container">
                <h4>CUENTA REGRESIVA</h4>
                <div id="countdown" class="countdown-circles"></div>
            </div>
        </section>

        <section class="actions-section">
            <div class="action-card">
                <p class="action-label">CONFIRMAR ASISTENCIA (RSVP)</p>
                <button class="btn-rsvp">CONFIRMAR AQUÍ</button>
            </div>
            <div class="action-card">
                <p class="action-label">MESA DE REGALOS</p>
                <button class="btn-gift"><i class="fas fa-gift"></i> VER DETALLES</button>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-left"><i class="fas fa-share-alt"></i> Compartir</div>
            <div class="footer-right"><span>Ubicación</span><span>Itinerario</span></div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
